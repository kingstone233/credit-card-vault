{% extends "base.html" %}
{% block title %}Card Details{% endblock %}
{% block content %}
<div class="card-box" style="max-width:420px;">
    <h1>Decrypted Card Details</h1>
    <p><strong>Card ID:</strong> {{ card.card_id }}</p>
    <p><strong>Type:</strong> {{ card.card_type }}</p>
    <p><strong>Full Number:</strong> <span class="masked">{{ card.card_number }}</span></p>
    <p><strong>CVV:</strong> <span class="masked">{{ card.cvv }}</span></p>
    <p><strong>Expiry:</strong> {{ card.expiry_date }}</p>
    <a class="link-btn" href="{{ url_for('list_cards') }}">Back to Cards</a>
</div>
{% endblock %}
