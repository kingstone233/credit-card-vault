{% extends "base.html" %}
{% block title %}New Invoice{% endblock %}
{% block content %}
<div class="card-box" style="max-width:480px;">
    <h1>New Invoice</h1>
    <form method="POST" action="{{ url_for('new_invoice') }}">
        <label for="customer_id">Customer</label>
        <select id="customer_id" name="customer_id" required>
            <option value="" disabled selected>Select a customer</option>
            {% for c in customers %}
            <option value="{{ c.customer_id }}">{{ c.full_name }} (ID {{ c.customer_id }})</option>
            {% endfor %}
        </select>

        <label for="card_id">Card</label>
        <select id="card_id" name="card_id" required>
            <option value="" disabled selected>Select a card</option>
            {% for c in cards %}
            <option value="{{ c.card_id }}">Card #{{ c.card_id }} - **** {{ c.last_four }} (Customer {{ c.customer_id }})</option>
            {% endfor %}
        </select>

        <label for="invoice_date">Invoice Date</label>
        <input type="date" id="invoice_date" name="invoice_date" required>

        <label for="amount">Amount ($)</label>
        <input type="number" step="0.01" id="amount" name="amount" required>

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="3"></textarea>

        <button type="submit">Create Invoice</button>
    </form>
</div>
{% endblock %}
